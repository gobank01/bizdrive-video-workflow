<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@800;900&family=Inter:wght@800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <!--
      Template 03 — fullscreen-top-insert-burst.
      The bottom (talking-head) video fills the whole 1080x1920 frame.
      B-roll appears in a floating 16:9 rounded insert card over the upper third
      of the frame — the face video stays visible around it. No top frame.
      Paths are per-job generic:
        assets/input/bg.png                            (fallback background)
        assets/intermediates/bottom_visual_master.mp4  (job face master, full-screen)
        assets/intermediates/broll/broll-NN.mp4        (job B-roll, added by scripts/add-broll.py)
      A new job's workspace already has these symlinks (see tools/new-job.sh),
      so no path-fixing is needed. Only the duration must be set per job:
        python3 scripts/set-duration.py <seconds>
    -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1080px; height: 1920px; overflow: hidden; background: #000; }
      #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; background: #000; }
      .clip { position: absolute; }
      .background { inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
      /* Full-screen media: the face (talking-head) video fills the whole frame. */
      .fullscreen-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: 50% 50%; transform-origin: center center; will-change: transform, object-position, opacity, filter; }
      #bottomVideo { z-index: 1; }
      /* Top insert: a floating 16:9 rounded card in the upper third. B-roll plays
         inside it while the face video stays visible around the edges. */
      .top-insert { position: absolute; left: 48px; top: 24px; width: 984px; height: 554px; object-fit: cover; object-position: 50% 50%; border-radius: 30px; border: 4px solid #f4c20f; box-shadow: 0 28px 64px rgba(0,0,0,.62), 0 0 0 1px rgba(0,0,0,.35), inset 0 2px 0 rgba(255,255,255,.1); transform-origin: center center; will-change: transform, object-position, opacity, filter; }
      .broll-frame { opacity: 0; visibility: hidden; filter: brightness(.99) contrast(1.02) saturate(1.03); z-index: 5; }
      /* Lower-third scrim — keeps captions readable over any full-screen footage. */
      .caption-scrim { left: 0; right: 0; bottom: 0; width: 100%; height: 760px; background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.58) 42%, rgba(0,0,0,.9) 100%); z-index: 9; pointer-events: none; }
      .subtitle-cue { left: 60px; right: 60px; top: 1490px; height: 160px; color: #fff; display: flex; align-items: center; justify-content: center; font-family: "IBM Plex Sans Thai", "Inter", sans-serif; font-weight: 800; line-height: 1; letter-spacing: -0.01em; text-align: center; z-index: 7; }
      .caption-box { display: inline-flex; align-items: center; justify-content: center; max-width: 92%; padding: 18px 36px; border: 1px solid rgba(244,194,15,.35); border-radius: 20px; background: linear-gradient(180deg, rgba(10,22,64,.78), rgba(8,16,50,.88)); backdrop-filter: blur(8px); box-shadow: 0 10px 28px rgba(0,0,0,.55), inset 0 0 18px rgba(244,194,15,.05); text-shadow: 0 4px 20px rgba(0,0,0,.85), 0 0 30px rgba(0,0,0,.7); white-space: nowrap; }
      .cap-xl .caption-box { font-size: 100px; }
      .cap-lg .caption-box { font-size: 84px; }
      .cap-md .caption-box { font-size: 60px; }
      .cap-sm .caption-box { font-size: 50px; }
      .gold { display: inline-block; margin: 0 .08em; padding: 0 .02em; font-family: "Inter", "IBM Plex Sans Thai", sans-serif; font-weight: 900; line-height: 1.25; vertical-align: baseline; transform-origin: center center; background: linear-gradient(180deg, #ffd93d 0%, #f4c20f 50%, #b8860b 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; text-shadow: 0 4px 20px rgba(244,194,15,.35); }
      .caption-box > .gold:first-child { margin-left: 0; }
      .caption-box > .gold:last-child { margin-right: 0; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="65.313333" data-width="1080" data-height="1920">
      <img id="background" class="clip background" src="assets/input/bg.png" alt="" data-start="0" data-duration="65.313333" data-track-index="0" />

      <video id="bottomVideo" class="clip fullscreen-media" data-layout-allow-overflow="true" src="assets/intermediates/bottom_visual_master.mp4" data-start="0" data-duration="65.313333" data-track-index="1" data-motion-kind="slow-fullscreen-inner-zoom" data-motion-duration="65.313333" data-volume="0" muted playsinline></video>

      <video id="broll01" class="clip top-insert broll-frame" src="assets/intermediates/broll/broll-01.mp4" data-start="3.000" data-duration="3" data-media-start="0" data-transition-mode="soft" data-transition-in="0.26" data-transition-out="0.26" data-pan-from="50% 51%" data-pan-to="50% 49%" data-motion-kind="inner-pan" data-motion-duration="3" data-track-index="4" data-volume="0" muted playsinline></video>

      <video id="broll02" class="clip top-insert broll-frame" src="assets/intermediates/broll/broll-02.mp4" data-start="13.000" data-duration="3" data-media-start="0" data-transition-mode="soft" data-transition-in="0.26" data-transition-out="0.26" data-pan-from="51% 50%" data-pan-to="49% 50%" data-motion-kind="inner-pan" data-motion-duration="3" data-track-index="5" data-volume="0" muted playsinline></video>

      <video id="broll03" class="clip top-insert broll-frame" src="assets/intermediates/broll/broll-03.mp4" data-start="36.000" data-duration="3" data-media-start="0" data-transition-mode="soft" data-transition-in="0.26" data-transition-out="0.26" data-pan-from="49% 50%" data-pan-to="51% 50%" data-motion-kind="inner-pan" data-motion-duration="3" data-track-index="6" data-volume="0" muted playsinline></video>

      <video id="broll04" class="clip top-insert broll-frame" src="assets/intermediates/broll/broll-04.mp4" data-start="54.000" data-duration="3" data-media-start="0" data-transition-mode="soft" data-transition-in="0.26" data-transition-out="0.26" data-pan-from="50% 49%" data-pan-to="50% 51%" data-motion-kind="inner-pan" data-motion-duration="3" data-track-index="7" data-volume="0" muted playsinline></video>





      <!-- B-roll clips are inserted here per job by scripts/add-broll.py
           (each becomes a floating 16:9 top-insert card on tracks 4+). -->

      <div id="captionScrim" class="clip caption-scrim" data-start="0" data-duration="65.313333" data-track-index="9"></div>

      <div id="captions-mount" class="clip" style="z-index: 10;" data-composition-id="captions-burst" data-composition-src="compositions/captions-burst.html" data-start="0" data-duration="65.313333" data-track-index="3" data-width="1080" data-height="1920"></div>

      <!-- TikTok follow end-card (block: compositions/tiktok-follow.html).
           Plays in the last 4.5s. scripts/set-duration.py keeps data-start
           pinned to (composition duration - 4.5) for every job. -->
      <div id="tiktok-follow-mount" class="clip" style="z-index: 11;" data-composition-id="tiktok-follow" data-composition-src="compositions/tiktok-follow.html" data-start="60.813333" data-duration="4.5" data-track-index="11" data-width="1080" data-height="1920"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const compositionDuration = 65.313333;

      // Full-screen face video — gentle continuous inner zoom.
      tl.from("#bottomVideo", { opacity: 0, duration: 0.35, ease: "power2.out" }, 0);
      tl.set("#bottomVideo", { scale: 1.0, objectPosition: "50% 50%", transformOrigin: "center center" }, 0);
      tl.to("#bottomVideo", { scale: 1.05, duration: compositionDuration, ease: "sine.inOut" }, 0);

      // B-roll — floating top-insert cards. The card pops in (scale + fade),
      // its inner footage pans gently while live, then it pops out. The card
      // box stays in place; only the footage inside drifts.
      document.querySelectorAll(".broll-frame").forEach((clip) => {
        const start = Number(clip.dataset.start || 0);
        const duration = Number(clip.dataset.duration || 0);
        const mode = clip.dataset.transitionMode || "soft";
        const fallbackDuration = mode === "bridge" ? 0.30 : 0.26;
        const inDuration = Math.min(Number(clip.dataset.transitionIn || fallbackDuration), duration / 3);
        const outDuration = Math.min(Number(clip.dataset.transitionOut || fallbackDuration), duration / 3);
        const exitStart = Math.max(start + duration - outDuration, start + inDuration);
        const panFrom = clip.dataset.panFrom || "50% 50%";
        const panTo = clip.dataset.panTo || "50% 50%";
        const enterEase = mode === "bridge" ? "back.out(2)" : "back.out(1.7)";
        const exitEase = mode === "bridge" ? "power2.inOut" : "power2.in";
        tl.set(clip, { autoAlpha: 0, scale: 0.9, objectPosition: panFrom, transformOrigin: "center center", filter: "brightness(0.99) contrast(1.02) saturate(1.03)" }, start - 0.001);
        tl.fromTo(clip, { autoAlpha: 0, scale: 0.9, filter: "brightness(0.99) contrast(1.02) saturate(1.03)" }, { autoAlpha: 1, scale: 1, filter: "brightness(1) contrast(1.03) saturate(1.04)", duration: inDuration, ease: enterEase, immediateRender: false }, start);
        tl.to(clip, { objectPosition: panTo, duration, ease: "sine.inOut" }, start);
        tl.to(clip, { autoAlpha: 0, scale: 0.94, filter: "brightness(0.97) contrast(1.01) saturate(1.02)", duration: outDuration, ease: exitEase }, exitStart);
      });

      document.querySelectorAll(".subtitle-cue").forEach((cue) => {
        const start = Number(cue.dataset.start || 0);
        const duration = Number(cue.dataset.duration || 0);
        const enterDuration = Math.min(0.4, Math.max(0.2, duration * 0.3));
        const exitStart = Math.max(start + duration - 0.3, start + enterDuration);
        tl.fromTo(cue, { y: 30, scale: 0.92, opacity: 0 }, { y: 0, scale: 1, opacity: 1, duration: enterDuration, ease: "back.out(1.7)", immediateRender: false }, start);
        const goldTargets = Array.from(cue.querySelectorAll(".gold"));
        if (goldTargets.length > 0) {
          tl.fromTo(goldTargets, { scale: 0.7, opacity: 0, transformOrigin: "center center" }, { scale: 1, opacity: 1, duration: 0.25, ease: "back.out(2)", transformOrigin: "center center", immediateRender: false }, start + 0.1);
        }
        tl.to(cue, { opacity: 0, duration: 0.3, ease: "power2.out" }, exitStart);
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
